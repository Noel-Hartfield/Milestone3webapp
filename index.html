<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movie Finder App</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f8;
}
header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}
.search-section{
    text-align:center;
    padding:20px;
}
input{
    padding:10px;
    width:260px;
}
button{
    padding:10px 15px;
    cursor:pointer;
}
.container{
    display:flex;
    padding:20px;
}
#results{
    width:60%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}
#details{
    width:40%;
    padding:20px;
    background:white;
    margin-left:20px;
    border-radius:8px;
}
.movie{
    background:white;
    padding:10px;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
}
.movie img{
    height:180px;
}
#pagination{
    text-align:center;
    margin-bottom:15px;
}
.page-btn{
    margin:5px;
    padding:8px 12px;
}
.active{
    background:black;
    color:white;
}
#collection{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
}
.collection-title{
    text-align:center;
}
</style>
</head>

<body>

<header>
<h1>🎬 Movie Finder</h1>
</header>

<section class="search-section">
<input type="text" id="searchBox" placeholder="Search movies...">
<button id="searchBtn">Search</button>
</section>

<section id="pagination"></section>

<div class="container">
<div id="results"></div>

<div id="details">
<h2>Movie Details</h2>
<p>Select a movie to see details.</p>
</div>
</div>

<h2 class="collection-title">⭐ Popular Movies</h2>
<div id="collection"></div>

<script>
const API_KEY = "73906d492d324e7602c0719c3a8324ac";
const IMG_URL = "https://image.tmdb.org/t/p/w500";

let allResults = [];
let currentPage = 1;
const resultsPerPage = 10;

//////////////////////////////////////////////////
// SEARCH MOVIES
//////////////////////////////////////////////////
$("#searchBtn").click(function () {
    let query = $("#searchBox").val();

    $.ajax({
        url:`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}&page=1`,
        success:function(data){
            // get up to 50 results
            allResults = data.results.slice(0,50);
            currentPage = 1;
            createPagination();
            displayPage();
        }
    });
});

//////////////////////////////////////////////////
// PAGINATION
//////////////////////////////////////////////////
function createPagination(){
    $("#pagination").empty();
    let pages = Math.ceil(allResults.length / resultsPerPage);

    for(let i=1;i<=pages;i++){
        $("#pagination").append(
            `<button class="page-btn" onclick="goToPage(${i})">${i}</button>`
        );
    }
}

function goToPage(page){
    currentPage = page;
    displayPage();
}

//////////////////////////////////////////////////
// DISPLAY SEARCH RESULTS
//////////////////////////////////////////////////
function displayPage(){
    $("#results").empty();

    let start = (currentPage-1)*resultsPerPage;
    let pageItems = allResults.slice(start,start+resultsPerPage);

    pageItems.forEach(movie=>{
        $("#results").append(`
            <div class="movie" onclick='showDetails(${JSON.stringify(movie)})'>
                <img src="${IMG_URL+movie.poster_path}">
                <h4>${movie.title}</h4>
            </div>
        `);
    });
}

//////////////////////////////////////////////////
// MOVIE DETAILS PANEL
//////////////////////////////////////////////////
function showDetails(movie){
    $("#details").html(`
        <h2>${movie.title}</h2>
        <img src="${IMG_URL+movie.poster_path}" width="200">
        <p><b>Release:</b> ${movie.release_date}</p>
        <p><b>Rating:</b> ${movie.vote_average}</p>
        <p>${movie.overview}</p>
    `);
}

//////////////////////////////////////////////////
// PREDEFINED COLLECTION (POPULAR MOVIES)
//////////////////////////////////////////////////
$(document).ready(function(){
    $.ajax({
        url:`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`,
        success:function(data){
            data.results.slice(0,10).forEach(movie=>{
                $("#collection").append(`
                    <div class="movie" onclick='showDetails(${JSON.stringify(movie)})'>
                        <img src="${IMG_URL+movie.poster_path}">
                        <p>${movie.title}</p>
                    </div>
                `);
            });
        }
    });
});
</script>

</body>
</html>
